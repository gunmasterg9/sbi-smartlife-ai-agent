version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sbi_postgres
    environment:
      POSTGRES_DB: sbi_smartlife
      POSTGRES_USER: sbi_user
      POSTGRES_PASSWORD: sbi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbi_user -d sbi_smartlife"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: sbi_chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sbi_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://sbi_user:sbi_password@postgres:5432/sbi_smartlife
      - DATABASE_SYNC_URL=postgresql://sbi_user:sbi_password@postgres:5432/sbi_smartlife
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - AI_MODE=${AI_MODE:-simulated}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sbi_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  chroma_data:
